name: Update Item Database from Wiki

on:
  # Run weekly on Mondays at 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run wiki scraper (merge mode)
        run: python update_db.py --merge

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet items.csv items.db || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add items.csv items.db
          git commit -m "Auto-update item database from wiki [$(date -u +%Y-%m-%d)]"
          git push
